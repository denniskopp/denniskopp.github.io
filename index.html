<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kopp Translations</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 24px;
      background: #000;
    }

    .fallback p {
      font-size: 18px;
      line-height: 1.5;
      margin: 0;
    }
  </style>
</head>
<body>
  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="language-without-borders-hero.mp4" type="video/mp4" />
    </video>

    <div class="fallback">
      <p>Your browser could not load the video.</p>
    </div>
  </section>
</body>
</html>
